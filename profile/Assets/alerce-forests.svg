<text class="th" x="340" y="36" text-anchor="middle" font-size="15">Fitzroya cupressoides — the longest-living tree species on Earth</text>
<text class="ts" x="340" y="56" text-anchor="middle">Pucheguín protects ~11% of all remaining alerce forests in Chile</text>
