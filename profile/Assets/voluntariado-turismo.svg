<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 520">
<style>text{font-family:'Segoe UI',system-ui,sans-serif}.th{font-size:14px;font-weight:600;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}</style>
<text class="th" x="340" y="32" text-anchor="middle" font-size="15">Community at the center — two sides of the same coin</text>
<rect x="40" y="60" width="280" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="180" y="86" text-anchor="middle" fill="#085041" dominant-baseline="central">Voluntariado Rural</text>
<rect x="50" y="124" width="260" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="180" y="143" text-anchor="middle" fill="#085041" dominant-baseline="central">3 weeks in Patagonia</text><text class="ts" x="180" y="163" text-anchor="middle" fill="#0F6E56" dominant-baseline="central">Supporting mountain families</text>
<rect x="50" y="196" width="260" height="52" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text class="th" x="180" y="215" text-anchor="middle" fill="#27500A" dominant-baseline="central">Arriero-gaucho culture</text><text class="ts" x="180" y="235" text-anchor="middle" fill="#3B6D11" dominant-baseline="central">UNESCO Living Treasures (2013)</text>
<rect x="50" y="268" width="260" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="180" y="287" text-anchor="middle" fill="#26215C" dominant-baseline="central">Educational camps</text><text class="ts" x="180" y="307" text-anchor="middle" fill="#534AB7" dominant-baseline="central">Students from Puelo and Cochamó</text>
<rect x="50" y="340" width="260" height="52" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="180" y="359" text-anchor="middle" fill="#2C2C2A" dominant-baseline="central">Voces de Puelo podcast</text><text class="ts" x="180" y="379" text-anchor="middle" fill="#5F5E5A" dominant-baseline="central">Students telling their stories</text>
<rect x="360" y="60" width="280" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="500" y="86" text-anchor="middle" fill="#4A1B0C" dominant-baseline="central">Tourism impact management</text>
<rect x="370" y="124" width="260" height="52" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="500" y="143" text-anchor="middle" fill="#4A1B0C" dominant-baseline="central">15,000 visitors / year</text><text class="ts" x="500" y="163" text-anchor="middle" fill="#993C1D" dominant-baseline="central">Cap established for the valley</text>
<rect x="370" y="196" width="260" height="52" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="th" x="500" y="215" text-anchor="middle" fill="#412402" dominant-baseline="central">Reservation system</text><text class="ts" x="500" y="235" text-anchor="middle" fill="#854F0B" dominant-baseline="central">Required since 2024 season</text>
<rect x="370" y="268" width="260" height="52" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text class="th" x="500" y="287" text-anchor="middle" fill="#4B1528" dominant-baseline="central">Visitor center</text><text class="ts" x="500" y="307" text-anchor="middle" fill="#993556" dominant-baseline="central">Opened December 2025</text>
<rect x="370" y="340" width="260" height="52" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="500" y="359" text-anchor="middle" fill="#2C2C2A" dominant-baseline="central">Trail master plan</text><text class="ts" x="500" y="379" text-anchor="middle" fill="#5F5E5A" dominant-baseline="central">Camps, stables, regulations</text>
<text class="ts" x="340" y="250" text-anchor="middle" fill="#888780" font-size="18">+</text>
<rect x="80" y="425" width="520" height="76" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text class="th" x="340" y="452" text-anchor="middle" fill="#27500A">Community-led conservation model</text><text class="ts" x="340" y="472" text-anchor="middle" fill="#3B6D11">80% strict protection + 20% sustainable use (agriculture, low-impact tourism)</text><text class="ts" x="340" y="490" text-anchor="middle" fill="#3B6D11">Managed by Fundación Conserva Pucheguín — independent board</text>
</svg>
