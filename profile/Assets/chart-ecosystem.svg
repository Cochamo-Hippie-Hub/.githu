<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 400">
<defs>
<linearGradient id="eForest" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#16a34a" stop-opacity=".85"/><stop offset="100%" stop-color="#22c55e" stop-opacity=".7"/></linearGradient>
<linearGradient id="eAlerce" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#065f46" stop-opacity=".8"/><stop offset="100%" stop-color="#059669" stop-opacity=".7"/></linearGradient>
<linearGradient id="eGlacier" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0284c7" stop-opacity=".75"/><stop offset="100%" stop-color="#38bdf8" stop-opacity=".6"/></linearGradient>
<linearGradient id="eWetland" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7c3aed" stop-opacity=".7"/><stop offset="100%" stop-color="#a78bfa" stop-opacity=".5"/></linearGradient>
<linearGradient id="eRiver" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0891b2" stop-opacity=".7"/><stop offset="100%" stop-color="#22d3ee" stop-opacity=".5"/></linearGradient>
<linearGradient id="eOther" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#d97706" stop-opacity=".6"/><stop offset="100%" stop-color="#fbbf24" stop-opacity=".4"/></linearGradient>
</defs>
<rect width="680" height="400" rx="12" fill="#0f172a"/>
<text x="340" y="28" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="600">Pucheguín Territory — Ecosystem Composition</text>
<text x="340" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">132,876 hectares by land cover type | Data: Conserva Pucheguín technical assessment</text>
<rect x="60" y="80" width="268" height="40" rx="6" fill="url(#eForest)"/><text x="194" y="105" text-anchor="middle" fill="#f0fdf4" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Primary forest — 58,819 ha (44%)</text>
<rect x="60" y="130" width="81" height="40" rx="6" fill="url(#eAlerce)"/><text x="100" y="155" text-anchor="middle" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Alerce 17,737 ha</text>
<text x="148" y="155" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">(13%)</text>
<rect x="60" y="180" width="155" height="40" rx="6" fill="#334155"/><text x="137" y="205" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="500">Alpine / rock / ice — 42,140 ha (32%)</text>
<rect x="60" y="230" width="23" height="40" rx="6" fill="url(#eGlacier)"/><text x="90" y="255" fill="#bae6fd" font-family="system-ui,sans-serif" font-size="11" font-weight="500">Glaciers — 507 ha</text>
<rect x="60" y="270" width="7" height="40" rx="4" fill="url(#eWetland)"/><text x="74" y="295" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="11" font-weight="500">Wetlands — 150 ha</text>
<rect x="60" y="310" width="70" height="40" rx="6" fill="url(#eOther)"/><text x="140" y="335" fill="#fde68a" font-family="system-ui,sans-serif" font-size="11" font-weight="500">Meadows, community areas — 14,030 ha (11%)</text>
<rect x="400" y="80" width="240" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="520" y="104" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Hydrographic network</text>
<text x="420" y="128" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="11">372 km riverbanks</text>
<text x="420" y="148" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="11">41 km lake/lagoon shores</text>
<text x="420" y="168" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="11">507 ha glacial ice</text>
<rect x="400" y="210" width="240" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="520" y="234" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Carbon storage</text>
<text x="420" y="258" fill="#4ade80" font-family="system-ui,sans-serif" font-size="11">Patagonian forests: 2x CO₂/ha vs Amazon</text>
<text x="420" y="278" fill="#4ade80" font-family="system-ui,sans-serif" font-size="11">~11% of Chile's total alerce forests</text>
<rect x="400" y="320" width="240" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="520" y="340" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Biodiversity</text>
<text x="420" y="358" fill="#c084fc" font-family="system-ui,sans-serif" font-size="11">40+ species monitored (camera traps)</text>
</svg>
