<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 620">
<style>text{font-family:'Segoe UI',system-ui,sans-serif}.th{font-size:14px;font-weight:600;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}</style>
<text class="th" x="340" y="32" text-anchor="middle" font-size="15">From threat to opportunity — 17 years of conservation</text>
<line x1="120" y1="70" x2="120" y2="590" stroke="#5f5e5a" stroke-width="1.5" opacity=".15"/>
<circle cx="120" cy="85" r="6" fill="#378ADD"/><text class="th" x="80" y="89" text-anchor="end">2009</text><rect x="150" y="68" width="490" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="th" x="395" y="90" text-anchor="middle" fill="#0C447C" dominant-baseline="central">Cochamó River declared Water Reserve (Pres. Bachelet)</text>
<circle cx="120" cy="135" r="6" fill="#1D9E75"/><text class="th" x="80" y="139" text-anchor="end">2013</text><rect x="150" y="118" width="490" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="395" y="140" text-anchor="middle" fill="#085041" dominant-baseline="central">Puelo Patagonia founded — Mediterráneo hydro fight begins</text>
<circle cx="120" cy="185" r="6" fill="#639922"/><text class="th" x="80" y="189" text-anchor="end">2016</text><rect x="150" y="168" width="490" height="36" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text class="th" x="395" y="190" text-anchor="middle" fill="#27500A" dominant-baseline="central">Puelo Sin Torres — hydroelectric project stopped</text>
<circle cx="120" cy="235" r="6" fill="#D85A30"/><text class="th" x="80" y="239" text-anchor="end">2022</text><rect x="150" y="218" width="490" height="36" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="395" y="240" text-anchor="middle" fill="#4A1B0C" dominant-baseline="central">Hacienda Pucheguín listed for sale via Christie's</text>
<circle cx="120" cy="285" r="6" fill="#7F77DD"/><text class="th" x="80" y="289" text-anchor="end">2023</text><rect x="150" y="268" width="490" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="395" y="290" text-anchor="middle" fill="#26215C" dominant-baseline="central">Cochamó Valley Nature Sanctuary — 11,400 ha protected</text>
<circle cx="120" cy="345" r="6" fill="#BA7517"/><text class="th" x="80" y="349" text-anchor="end">2024</text><rect x="150" y="318" width="490" height="56" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="th" x="395" y="338" text-anchor="middle" fill="#412402" dominant-baseline="central">Conserva Pucheguín campaign launched (April)</text><text class="ts" x="395" y="360" text-anchor="middle" fill="#854F0B" dominant-baseline="central">New York Times feature — worldwide media coverage</text>
<circle cx="120" cy="420" r="10" fill="#639922" stroke="#27500A" stroke-width="2"/><text class="th" x="80" y="424" text-anchor="end">2025</text><rect x="150" y="393" width="490" height="76" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/><text class="th" x="395" y="416" text-anchor="middle" fill="#173404" dominant-baseline="central" font-size="15">HISTORIC: $78M raised — Pucheguín purchased</text><text class="ts" x="395" y="438" text-anchor="middle" fill="#3B6D11" dominant-baseline="central">Fundación Conserva Pucheguín constituted (August)</text><text class="ts" x="395" y="456" text-anchor="middle" fill="#3B6D11" dominant-baseline="central">Ríos Puelo and Futaleufú — ecological flow reserves</text>
<circle cx="120" cy="510" r="6" fill="#D4537E"/><text class="th" x="80" y="514" text-anchor="end">2026</text><rect x="150" y="488" width="490" height="56" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text class="th" x="395" y="508" text-anchor="middle" fill="#4B1528" dominant-baseline="central">"Cochamó por Siempre" film premieres (Patagonia Films)</text><text class="ts" x="395" y="530" text-anchor="middle" fill="#993556" dominant-baseline="central">Long-term conservation and management plan begins</text>
<text class="ts" x="340" y="580" text-anchor="middle" fill="#888780">Cochamó Hippie Hub — documenting 17 years of territorial defense</text>
</svg>
