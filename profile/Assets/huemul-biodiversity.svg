<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 480">
<style>text{font-family:'Segoe UI',system-ui,sans-serif}.th{font-size:14px;font-weight:600;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}</style>
<text class="th" x="340" y="36" text-anchor="middle" font-size="15">Biodiversity monitoring — Pucheguín wildlife</text>
<text class="ts" x="340" y="56" text-anchor="middle">40+ species identified through participatory camera trap monitoring</text>
<g transform="translate(260,80)" opacity=".12"><path d="M60 120L50 60Q48 40,55 30L60 20Q65 10,70 15L75 25L80 15Q85 5,90 12L95 22Q100 30,98 40L90 60L85 120Z" fill="#5f5e5a"/><ellipse cx="75" cy="140" rx="35" ry="14" fill="#5f5e5a"/><line x1="55" y1="140" x2="50" y2="180" stroke="#5f5e5a" stroke-width="3"/><line x1="65" y1="140" x2="62" y2="180" stroke="#5f5e5a" stroke-width="3"/><line x1="85" y1="140" x2="88" y2="180" stroke="#5f5e5a" stroke-width="3"/><line x1="95" y1="140" x2="98" y2="180" stroke="#5f5e5a" stroke-width="3"/></g>
<rect x="40" y="90" width="200" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="140" y="118" text-anchor="middle" fill="#085041">Huemul deer</text><text class="ts" x="140" y="138" text-anchor="middle" fill="#0F6E56">Northernmost subpopulation</text><text class="ts" x="140" y="154" text-anchor="middle" fill="#0F6E56">in Chilean Patagonia</text>
<rect x="440" y="90" width="200" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="540" y="118" text-anchor="middle" fill="#26215C">Darwin's frog</text><text class="ts" x="540" y="138" text-anchor="middle" fill="#534AB7">Endemic amphibian</text><text class="ts" x="540" y="154" text-anchor="middle" fill="#534AB7">unique to the region</text>
<rect x="40" y="200" width="200" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="140" y="228" text-anchor="middle" fill="#4A1B0C">Patagonian vizcacha</text><text class="ts" x="140" y="248" text-anchor="middle" fill="#993C1D">Recent sighting in</text><text class="ts" x="140" y="264" text-anchor="middle" fill="#993C1D">Trinidad Valley</text>
<rect x="440" y="200" width="200" height="80" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text class="th" x="540" y="228" text-anchor="middle" fill="#4B1528">Monito del monte</text><text class="ts" x="540" y="248" text-anchor="middle" fill="#993556">One of South America's</text><text class="ts" x="540" y="264" text-anchor="middle" fill="#993556">only marsupials</text>
<rect x="240" y="310" width="200" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text class="th" x="340" y="332" text-anchor="middle" fill="#27500A" dominant-baseline="central">22 camera traps</text><text class="ts" x="340" y="350" text-anchor="middle" fill="#3B6D11" dominant-baseline="central">Active in Cochamó Valley</text>
<line x1="140" y1="280" x2="280" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity=".5"/><line x1="540" y1="280" x2="400" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity=".5"/><line x1="140" y1="170" x2="260" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity=".5"/><line x1="540" y1="170" x2="420" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity=".5"/>
<rect x="40" y="400" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340" y="422" text-anchor="middle" fill="#2C2C2A">Participatory wildlife monitoring program</text><text class="ts" x="340" y="442" text-anchor="middle" fill="#5F5E5A">Puelo Patagonia + local communities + camera traps since 2024</text>
</svg>
